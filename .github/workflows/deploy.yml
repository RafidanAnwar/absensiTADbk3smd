name: Deploy to GAS and GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build React App
        run: |
          npm ci
          npm run build

      - name: Install & Authenticate Clasp
        run: |
          npm install -g @google/clasp
          echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json
          
      # Navigate to gas folder and push
      - name: Deploy Backend to Apps Script
        run: |
          cd gas
          clasp push -f

      # Deploy to GitHub Pages (gh-pages branch)
      - name: Deploy Frontend to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
